src-stats:
- comments:
  - All the values and their counts that appear in column ethnicity_concept_id of
    table person
  name: auto__person__ethnicity_concept_id
  query: "SELECT _counted.value, _counted.count \nFROM (SELECT \"ethnicity_concept_id\"\
    \ AS value, count(\"ethnicity_concept_id\") AS count \nFROM mimic.person \nWHERE\
    \ \"ethnicity_concept_id\" IS NOT NULL GROUP BY \"ethnicity_concept_id\") AS _counted\
    \ ORDER BY _counted.count DESC"
- comments:
  - All the values and their counts that appear in column gender_concept_id of table
    person
  name: auto__person__gender_concept_id
  query: "SELECT _counted.value, _counted.count \nFROM (SELECT \"gender_concept_id\"\
    \ AS value, count(\"gender_concept_id\") AS count \nFROM mimic.person \nWHERE\
    \ \"gender_concept_id\" IS NOT NULL GROUP BY \"gender_concept_id\") AS _counted\
    \ ORDER BY _counted.count DESC"
- comments:
