tables:
  manufacturer:
    columns:
      founded:
        type: TIMESTAMP WITH TIME ZONE
      id:
        primary: true
        type: INTEGER
      name:
        type: TEXT
  model:
    columns:
      id:
        primary: true
        type: INTEGER
      introduced:
        type: TIMESTAMP WITH TIME ZONE
      manufacturer_id:
        foreign_keys:
        - manufacturer.id
        type: INTEGER
      name:
        type: TEXT
  player:
    columns:
      family_name:
        type: TEXT
      given_name:
        type: TEXT
      id:
        primary: true
        type: INTEGER
  signature_model:
    columns:
      based_on:
        foreign_keys:
        - model.id
        type: INTEGER
      id:
        primary: true
        type: INTEGER
      name:
        type: VARCHAR(20)
      player_id:
        foreign_keys:
        - player.id
        type: INTEGER
  string:
    columns:
      frequency:
        type: DOUBLE PRECISION
      id:
        primary: true
        type: INTEGER
      model_id:
        foreign_keys:
        - model.id
        type: INTEGER
      position:
        type: INTEGER
